kind = "web"
previewPath = "/"
title = "TradeScope"
version = "1.0.0"
id = "artifacts/tradescope"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25965

[services.development]
run = "pnpm --filter @workspace/tradescope run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradescope", "run", "build" ]
publicDir = "artifacts/tradescope/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25965"
BASE_PATH = "/"
